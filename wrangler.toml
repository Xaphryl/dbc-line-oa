name = "dbc-line-oa"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for LINE event dedup (5 min TTL) + verification session state (10 min TTL)
# Create with: wrangler kv:namespace create LINE_OA_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "LINE_OA_KV"
id = "0b85d72e3c4743618533625054d792a2"

# Secrets (set via `wrangler secret put <NAME>` — never committed):
#   LINE_CHANNEL_SECRET        — for x-line-signature HMAC verify
#   LINE_CHANNEL_ACCESS_TOKEN  — for calling LINE Messaging API
#   LINE_OA_API_KEY            — shared secret for PHP API auth (X-Line-Oa-Key header)
#   TELEGRAM_BOT_TOKEN         — for follow/unfollow notifications
#   TELEGRAM_CHAT_ID           — for follow/unfollow notifications

# Non-secret env vars (can go here):
[vars]
PHP_API_BASE_URL = "https://dentalbuddyclinic.com/line-oa/api"
IMAGE_BASE_URL = "https://dentalbuddyclinic.com/line-oa/images"
CLINIC_PHONE = "0956236663"
FORWARD_WEBHOOK_URL = "https://app.fd-th.com/api/v1/index.php/line.iInsert_line_message"
